<!DOCTYPE html>
<html>
<head>
    <title>Add Subject</title>
</head>
<body>

    <h1>Add Subject</h1>

    <form action="/add-subject" method="POST">

        <input
            type="text"
            name="subject_name"
            placeholder="Subject Name"
            required
        >

        <br><br>

        <input
            type="text"
            name="subject_code"
            placeholder="Subject Code"
            required
        >

        <br><br>

        <input
            type="text"
            name="level"
            placeholder="Level"
            required
        >

        <br><br>

        <button type="submit">
            Add Subject
        </button>

    </form>

</body>
</html>
