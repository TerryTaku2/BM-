<!DOCTYPE html>
<html>
<head>
    <title>Enroll Student</title>
</head>
<body>

    <h1>Enroll Student</h1>

    <form action="/enroll-student" method="POST">

        <input
            type="number"
            name="student_id"
            placeholder="Student ID"
            required
        >

        <br><br>

        <input
            type="number"
            name="subject_id"
            placeholder="Subject ID"
            required
        >

        <br><br>

        <button type="submit">
            Enroll Student
        </button>

    </form>

</body>
</html>
