<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMLC — Record Payment</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
    <a href="/admin-dashboard" class="brand">BMLC ELMS</a>
    <div class="nav-links">
        <a href="/admin-dashboard" class="nav-btn">&#8592; Dashboard</a>
        <a href="/logout" class="nav-btn logout">Logout</a>
    </div>
</nav>

<div class="container" style="max-width:560px">

    <div class="card">
        <h2>Record Payment</h2>

        <div class="alert alert-success" id="successMsg"></div>
        <div class="alert alert-error" id="errorMsg"></div>

        <form id="paymentForm">

            <div class="form-group">
                <label for="student_id">Student</label>
                <select id="student_id" name="student_id" required>
                    <option value="">Loading students...</option>
                </select>
            </div>

            <div id="sourceInfo" style="background:#f8fafc;border-radius:8px;padding:0.9rem 1rem;margin-bottom:1rem;font-size:0.88rem;display:none">
                <span id="sourceText"></span>
            </div>

            <div class="form-group">
                <label for="amount">Amount ($)</label>
                <input type="number" id="amount" name="amount" step="0.01" min="0.01" placeholder="0.00" required>
            </div>

            <div id="preview" style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:1rem;margin-bottom:1rem;font-size:0.88rem;display:none">
                <strong>Commission Breakdown</strong><br>
                <span id="previewText"></span>
            </div>

            <button type="submit" class="btn btn-success" id="submitBtn">
                Record Payment
            </button>

        </form>
    </div>

</div>

<script>
    let currentSource = "bm";

    async function populateStudents() {
        try {
            const res = await fetch("/api/students");
            if (res.status === 401) return window.location.href = "/login";
            const students = await res.json();
            const sel = document.getElementById("student_id");
            sel.innerHTML = '<option value="">Select a student</option>' +
                students.map(s => `<option value="${s.id}">${s.fullname} (${s.email})</option>`).join("");
        } catch {
            document.getElementById("errorMsg").textContent = "Failed to load students.";
            document.getElementById("errorMsg").classList.add("show");
        }
    }

    async function onStudentChange() {
        const id = document.getElementById("student_id").value;
        const sourceInfo = document.getElementById("sourceInfo");
        const sourceText = document.getElementById("sourceText");

        if (!id) {
            sourceInfo.style.display = "none";
            document.getElementById("preview").style.display = "none";
            return;
        }

        try {
            const res = await fetch(`/api/students/${id}/source`);
            const data = await res.json();
            currentSource = data.student_source || "bm";

            if (currentSource === "tutor") {
                sourceText.innerHTML = `<span class="badge badge-green">Tutor Referral</span> — referred by <strong>${data.tutor_name}</strong> (${data.referral_code}) &nbsp;|&nbsp; Tutor: 60%, BM: 40%`;
            } else {
                sourceText.innerHTML = `<span class="badge badge-blue">BM Student</span> — enrolled directly &nbsp;|&nbsp; Tutor: 40%, BM: 60%`;
            }

            sourceInfo.style.display = "block";
            updatePreview();
        } catch {
            sourceInfo.style.display = "none";
        }
    }

    function updatePreview() {
        const amount = parseFloat(document.getElementById("amount").value) || 0;
        const preview = document.getElementById("preview");
        const previewText = document.getElementById("previewText");

        if (amount > 0 && document.getElementById("student_id").value) {
            const tutorPct = currentSource === "tutor" ? 0.6 : 0.4;
            const bmPct    = currentSource === "tutor" ? 0.4 : 0.6;
            previewText.innerHTML =
                `Tutor commission: <strong>$${(amount * tutorPct).toFixed(2)}</strong> &nbsp;|&nbsp; ` +
                `BM profit: <strong>$${(amount * bmPct).toFixed(2)}</strong>`;
            preview.style.display = "block";
        } else {
            preview.style.display = "none";
        }
    }

    document.getElementById("student_id").addEventListener("change", onStudentChange);
    document.getElementById("amount").addEventListener("input", updatePreview);

    document.getElementById("paymentForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const btn = document.getElementById("submitBtn");
        const successMsg = document.getElementById("successMsg");
        const errorMsg = document.getElementById("errorMsg");

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Recording...';
        successMsg.classList.remove("show");
        errorMsg.classList.remove("show");

        const body = {
            student_id: document.getElementById("student_id").value,
            amount: document.getElementById("amount").value
        };

        try {
            const res = await fetch("/record-payment", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });

            const data = await res.json();

            if (res.ok) {
                successMsg.textContent =
                    `${data.message} — Tutor: $${parseFloat(data.tutor_commission).toFixed(2)}, BM: $${parseFloat(data.bm_profit).toFixed(2)}`;
                successMsg.classList.add("show");
                e.target.reset();
                document.getElementById("preview").style.display = "none";
                document.getElementById("sourceInfo").style.display = "none";
            } else {
                errorMsg.textContent = data.message || "Payment failed";
                errorMsg.classList.add("show");
            }
        } catch {
            errorMsg.textContent = "Network error. Please try again.";
            errorMsg.classList.add("show");
        }

        btn.disabled = false;
        btn.textContent = "Record Payment";
    });

    populateStudents();
</script>

</body>
</html>
