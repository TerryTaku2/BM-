<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMLC — Register</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">

        <div class="auth-logo">
            <div class="logo-text">BMLC</div>
            <div class="logo-sub">E-Learning Management System</div>
        </div>

        <h1>Create account</h1>
        <p class="subtitle">Register as a student, tutor, or parent</p>

        <div class="alert alert-success" id="successMsg"></div>
        <div class="alert alert-error" id="errorMsg"></div>

        <form id="registerForm">

            <div class="form-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Min. 6 characters" minlength="6" required>
            </div>

            <div class="form-group">
                <label for="role">Role</label>
                <select id="role" name="role" required>
                    <option value="">Select your role</option>
                    <option value="student">Student</option>
                    <option value="tutor">Tutor</option>
                    <option value="parent">Parent</option>
                </select>
            </div>

            <div class="form-group">
                <label for="referral_code">Referral Code <span style="color:#94a3b8;font-weight:400">(optional)</span></label>
                <input type="text" id="referral_code" name="referral_code" placeholder="Enter referral code if you have one">
            </div>

            <button type="submit" class="btn btn-primary" id="submitBtn">
                Create Account
            </button>

        </form>

        <p class="auth-link">
            Already have an account? <a href="/login">Sign in</a>
        </p>

    </div>
</div>

<script>
    document.getElementById("registerForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const btn = document.getElementById("submitBtn");
        const successMsg = document.getElementById("successMsg");
        const errorMsg = document.getElementById("errorMsg");

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Creating account...';
        successMsg.classList.remove("show");
        errorMsg.classList.remove("show");

        const body = {
            fullname: document.getElementById("fullname").value.trim(),
            email: document.getElementById("email").value.trim(),
            password: document.getElementById("password").value,
            role: document.getElementById("role").value,
            referral_code: document.getElementById("referral_code").value.trim()
        };

        try {
            const res = await fetch("/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });

            const data = await res.json();

            if (res.ok) {
                successMsg.textContent = "Account created! Redirecting to login...";
                successMsg.classList.add("show");
                setTimeout(() => window.location.href = "/login", 1500);
            } else {
                errorMsg.textContent = data.message || "Registration failed";
                errorMsg.classList.add("show");
                btn.disabled = false;
                btn.textContent = "Create Account";
            }
        } catch {
            errorMsg.textContent = "Network error. Please try again.";
            errorMsg.classList.add("show");
            btn.disabled = false;
            btn.textContent = "Create Account";
        }
    });
</script>

</body>
</html>
