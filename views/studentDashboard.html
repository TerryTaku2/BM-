<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMLC — Student Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
    <a href="/student-dashboard" class="brand">BMLC ELMS</a>
    <div class="nav-links">
        <span id="userName">Loading...</span>
        <a href="/logout" class="nav-btn logout">Logout</a>
    </div>
</nav>

<div class="container">

    <div class="welcome-banner">
        <h1 id="welcomeText">Welcome!</h1>
        <p>Here are your enrolled subjects</p>
    </div>

    <div class="action-links">
        <a href="/notes-library">&#128196; Notes Library</a>
        <a href="/my-attendance">&#9989; My Attendance</a>
        <a href="/my-results">&#127942; My Results</a>
        <a href="/messages">&#128140; Messages</a>
        <a href="/community">&#127757; Community</a>
    </div>

    <div class="card">
        <h2>My Enrolled Subjects</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Subject Name</th>
                        <th>Code</th>
                        <th>Level</th>
                        <th>Enrolled On</th>
                    </tr>
                </thead>
                <tbody id="enrollmentsTable">
                    <tr class="loading-row"><td colspan="4">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>
    async function loadUser() {
        const res = await fetch("/api/me");
        if (!res.ok) return window.location.href = "/login";
        const user = await res.json();
        document.getElementById("userName").textContent = user.fullname;
        document.getElementById("welcomeText").textContent = `Welcome, ${user.fullname}!`;
    }

    async function loadEnrollments() {
        const tbody = document.getElementById("enrollmentsTable");
        try {
            const res = await fetch("/my-enrollments");
            if (res.status === 401) return window.location.href = "/login";
            const rows = await res.json();

            if (!rows.length) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty-state">You are not enrolled in any subjects yet.</td></tr>';
                return;
            }

            tbody.innerHTML = rows.map(r => `
                <tr>
                    <td><strong>${r.subject_name}</strong></td>
                    <td><span class="badge badge-blue">${r.subject_code}</span></td>
                    <td>${r.level}</td>
                    <td>${new Date(r.created_at).toLocaleDateString()}</td>
                </tr>
            `).join("");
        } catch {
            tbody.innerHTML = '<tr><td colspan="4" class="empty-state">Failed to load enrollments.</td></tr>';
        }
    }

    loadUser();
    loadEnrollments();
</script>

</body>
</html>
